# SecureUSB Configuration File

# Database Configuration
db.url=jdbc:sqlite:whitelist.db

# Rate Limiter Settings
rate.max_connections=5
rate.time_window_seconds=10

# System Settings
system.default_mode=PRODUCTION
system.simulation_mode=true

# Logging
log.file=secureusb.log
log.level=INFO

# UI Settings
ui.theme=dark
ui.update_interval_ms=1000